version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1

  - package-ecosystem: "npm"
    directory: "/webapp"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
