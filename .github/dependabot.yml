version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/webapp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      webapp-dependencies:
        patterns: ["*"]
